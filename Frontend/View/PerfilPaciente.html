<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Paciente - Agendador de Citas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="perfil-layout.css">
</head>
<body>
    <header class="header">
        <h1 class="header_logo">Agendador de Citas</h1>
        <nav class="nav">
            <ul class="nav__list">
                <li class="nav__item"><a href="MenuCitas.html" class="nav__link">Menú Principal</a></li>
                <li class="nav__item"><a href="ConsultarCitas.html" class="nav__link">Mis Citas</a></li>
                <li class="nav__item"><a href="RegistrarCita.html" class="nav__link">Agendar Cita</a></li>
                <li class="nav__item"><a href="PerfilPaciente.html" class="nav__link" style="background-color: rgba(255,255,255,0.3);">Mi Perfil</a></li>
            </ul>
        </nav>
    </header>

    <main class="perfil-container">
        <aside class="perfil-sidebar">
            <img id="sideAvatar" src="" alt="Avatar" class="avatar-grande">
            <h3 id="sideNombre" class="nombre-perfil">Cargando...</h3>
            <span class="rol-tag paciente">Paciente</span>
            <div style="text-align:left;margin-top:20px;font-size:14px;color:#555;">
                <p><strong>Cédula/ID:</strong> <span id="sideCedula"></span></p>
                <p><strong>Correo:</strong> <span id="sideCorreo"></span></p>
            </div>
            <button type="button" class="btn-cerrar-sesion" id="btnCerrarSesion">Cerrar Sesión</button>
        </aside>

        <section class="perfil-main">
            <h2>Modificar Mis Datos de Contacto</h2>
            <p>Actualice su información de contacto. El ID y el rol no pueden modificarse.</p>

            <form id="perfilForm" novalidate>
                <div class="input-group">
                    <label>Cédula / ID</label>
                    <input type="text" id="inputID" class="input-disabled" readonly>
                </div>
                <div class="input-group">
                    <label for="inputCorreo">Correo Electrónico*</label>
                    <input type="text" id="inputCorreo" required>
                    <span id="correoFeedback" class="feedback"></span>
                </div>
                <div class="input-group">
                    <label for="inputTelefono">Teléfono</label>
                    <input type="text" id="inputTelefono" placeholder="Ej. 0987654321">
                    <span id="telefonoFeedback" class="feedback"></span>
                </div>
                <div class="input-group">
                    <label for="inputFoto">Foto de Perfil (URL)</label>
                    <input type="text" id="inputFoto">
                </div>
                <div class="input-group">
                    <label for="inputBiografia">Biografía / Observaciones</label>
                    <textarea id="inputBiografia" rows="4"></textarea>
                </div>
                <button type="submit" id="btnGuardar">Guardar Cambios</button>
                <span id="loader" class="loader-login" style="display:none;"></span>
            </form>
        </section>
    </main>

    <div id="toast" class="toast-notificacion"></div>
    <script src="../ViewHandling/config.js"></script>
    <script src="../ViewHandling/PerfilPacienteView.js"></script>
</body>
</html>
