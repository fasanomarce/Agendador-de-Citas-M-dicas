<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador - Agendador de Citas</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .admin-panel {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }
        .input-group { margin-bottom: 15px; }
        .toast-notificacion {
            position: fixed; top: 20px; right: 20px;
            background: #28a745; color: white; padding: 15px 25px;
            border-radius: 8px; display: none; z-index: 1100; font-weight: 600;
        }
        .toast-notificacion.error { background: #dc3545; }
    </style>
</head>
<body>
    <header class="header">
        <h1 class="header_logo">Agendador de Citas</h1>
        <nav class="nav">
            <ul class="nav__list">
                <li class="nav__item"><a href="MenuCitas.html" class="nav__link">Menú Principal</a></li>
                <li class="nav__item"><a href="ConsultarCitas.html" class="nav__link">Consultar Citas</a></li>
                <li class="nav__item"><a href="PerfilAdmin.html" class="nav__link" style="background:rgba(255,255,255,0.3)">Administración</a></li>
                <li class="nav__item"><a href="Perfil.html" class="nav__link">Mi Perfil</a></li>
            </ul>
        </nav>
    </header>

    <main class="admin-container">
        <div class="admin-panel">
            <h2>Panel de Administración</h2>
            <p>Registre doctores, secretarios, administradores o pacientes en el sistema.</p>
            <form id="adminRegForm" novalidate>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px">
                    <div class="input-group">
                        <label for="adminRol">Rol a Registrar*</label>
                        <select id="adminRol" required>
                            <option value="">Seleccione...</option>
                            <option value="Especialista">Doctor (Especialista)</option>
                            <option value="Secretario">Secretario Clínico</option>
                            <option value="Administrador">Administrador</option>
                            <option value="Paciente">Paciente</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="adminCedula">Cédula / ID*</label>
                        <input type="text" id="adminCedula" required>
                    </div>
                    <div class="input-group">
                        <label for="adminNombre">Nombre*</label>
                        <input type="text" id="adminNombre" required>
                    </div>
                    <div class="input-group">
                        <label for="adminApellido">Apellido*</label>
                        <input type="text" id="adminApellido" required>
                    </div>
                    <div class="input-group">
                        <label for="adminCorreo">Correo*</label>
                        <input type="text" id="adminCorreo" required>
                    </div>
                    <div class="input-group">
                        <label for="adminContrasena">Contraseña*</label>
                        <input type="password" id="adminContrasena" required>
                    </div>
                </div>
                <div id="adminCamposEspecialista" style="display:none;margin-top:15px">
                    <div class="input-group">
                        <label for="adminEspecialidad">Especialidad*</label>
                        <select id="adminEspecialidad"></select>
                    </div>
                    <div class="input-group">
                        <label for="adminRolClinico">Cargo clínico</label>
                        <input type="text" id="adminRolClinico" placeholder="Médico Titular">
                    </div>
                </div>
                <div id="adminCamposSecretario" style="display:none;margin-top:15px">
                    <div class="input-group">
                        <label for="adminArea">Área asignada*</label>
                        <select id="adminArea"></select>
                    </div>
                    <div class="input-group">
                        <label for="adminRolAdmin">Cargo administrativo</label>
                        <input type="text" id="adminRolAdmin" placeholder="Recepción Dpto.">
                    </div>
                </div>
                <button type="submit" id="btnAdminRegistrar" style="margin-top:20px">Registrar Personal</button>
            </form>
        </div>

        <div class="admin-panel">
            <h2>Nueva Especialidad Médica</h2>
            <form id="especialidadForm" novalidate>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px">
                    <div class="input-group"><label>Nombre*</label><input type="text" id="espNombre" required></div>
                    <div class="input-group"><label>Ubicación*</label><input type="text" id="espUbicacion" required></div>
                    <div class="input-group">
                        <label for="espDoctorAsignado">Doctor Asignado (Requerido)*</label>
                        <select id="espDoctorAsignado" required>
                            <option value="">Cargando doctores...</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>Descripción*</label>
                    <textarea id="espDescripcion" rows="3" required></textarea>
                </div>
                <button type="submit">Registrar Especialidad</button>
            </form>
        </div>

        <button onclick="perfilAdminView.cerrarSesion()" style="background:#dc3545;color:#fff">Cerrar Sesión</button>
    </main>

    <div id="toast" class="toast-notificacion"></div>
    <script src="../ViewHandling/rolUtils.js"></script>
    <script src="../ViewHandling/PerfilAdminView.js"></script>
</body>
</html>
