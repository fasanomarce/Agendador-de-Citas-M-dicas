<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Especialista - Agendador de Citas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="perfil-layout.css">
</head>
<body>
    <header class="header">
        <h1 class="header_logo">Agendador de Citas</h1>
        <nav class="nav">
            <ul class="nav__list">
                <li class="nav__item"><a href="PerfilEspecialista.html" class="nav__link" style="background-color: rgba(255,255,255,0.3);">Mis Citas</a></li>
                <li class="nav__item"><a href="ConsultarCitas.html" class="nav__link">Agenda</a></li>
            </ul>
        </nav>
    </header>

    <main class="perfil-container">
        <aside class="perfil-sidebar">
            <img id="sideAvatar" src="" alt="Avatar" class="avatar-grande">
            <h3 id="sideNombre" class="nombre-perfil"></h3>
            <span class="rol-tag especialista">Especialista</span>
            <p id="sideEspecialidad" style="font-size:14px;color:#555;"></p>
            <button type="button" class="btn-cerrar-sesion" id="btnCerrarSesion">Cerrar Sesión</button>
        </aside>

        <section class="perfil-main">
            <h2>Citas agendadas con pacientes</h2>
            <p>Marque cada cita como completada una vez atendida al paciente.</p>
            <div id="listaCitas"></div>
        </section>
    </main>

    <div id="toast" class="toast-notificacion"></div>
    <script src="../ViewHandling/config.js"></script>
    <script src="../ViewHandling/PerfilEspecialistaView.js"></script>
</body>
</html>
