<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Secretario - Agendador de Citas</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .sec-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: grid; gap: 25px; }
        .sec-panel { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .input-buscar { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 12px; }
        .pacientes-lista { list-style: none; padding: 0; max-height: 180px; overflow-y: auto; border: 1px solid #ddd; }
        .pacientes-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #eee; }
        .pacientes-item.activo { background: #cce5ff; }
        .cita-card { border: 1px solid #e1e8ed; padding: 15px; border-radius: 8px; margin-bottom: 12px; }
        .toast-notificacion { position: fixed; top: 20px; right: 20px; background: #28a745; color: #fff; padding: 15px 25px; border-radius: 8px; display: none; z-index: 1100; }
        .toast-notificacion.error { background: #dc3545; }
    </style>
</head>
<body>
    <header class="header">
        <h1 class="header_logo">Agendador de Citas</h1>
        <nav class="nav">
            <ul class="nav__list">
                <li class="nav__item"><a href="PerfilSecretario.html" class="nav__link" style="background:rgba(255,255,255,0.3)">Operaciones</a></li>
                <li class="nav__item"><a href="ConsultarCitas.html" class="nav__link">Consultar Citas</a></li>
                <li class="nav__item"><a href="Perfil.html" class="nav__link">Mi Perfil</a></li>
            </ul>
        </nav>
    </header>

    <main class="sec-container">
        <section class="sec-panel">
            <h2>Gestión de Pacientes</h2>
            <input type="text" id="buscadorPaciente" class="input-buscar" placeholder="Buscar por nombre, apellido o cédula...">
            <ul id="listaPacientes" class="pacientes-lista"></ul>
            <form id="formPaciente" style="margin-top:20px" novalidate>
                <h3 id="tituloEdicion">Seleccione un paciente</h3>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                    <div><label>Nombre</label><input type="text" id="inputNombre"></div>
                    <div><label>Apellido</label><input type="text" id="inputApellido"></div>
                    <div><label>Correo</label><input type="text" id="inputCorreo"></div>
                    <div><label>Teléfono</label><input type="text" id="inputTelefono"></div>
                </div>
                <div style="margin-top:10px"><label>Biografía</label><textarea id="inputBiografia" rows="2"></textarea></div>
                <button type="submit" style="margin-top:15px">Guardar datos del paciente</button>
            </form>
        </section>

        <section class="sec-panel">
            <h2>Modificar citas de pacientes</h2>
            <div id="listaCitas"></div>
        </section>

        <section class="sec-panel">
            <h2>Asignar bloque horario a médico</h2>
            <form id="formBloque" novalidate>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                    <div><label>Médico</label><select id="selectEspecialista" required></select></div>
                    <div><label>Especialidad</label><input type="text" id="bloqueEspecialidad" readonly></div>
                    <div><label>Fecha</label><input type="date" id="bloqueFecha" required></div>
                    <div><label>Hora inicio</label><input type="time" id="bloqueInicio" required></div>
                    <div><label>Hora fin</label><input type="time" id="bloqueFin" required></div>
                </div>
                <button type="submit" style="margin-top:15px">Asignar bloque</button>
            </form>
            <ul id="listaBloques" style="margin-top:15px;list-style:none;padding:0"></ul>
        </section>

        <button onclick="perfilSecretarioView.cerrarSesion()" style="background:#dc3545;color:#fff">Cerrar Sesión</button>
    </main>

    <div id="toast" class="toast-notificacion"></div>
    <script src="../ViewHandling/rolUtils.js"></script>
    <script src="../ViewHandling/PerfilSecretarioView.js"></script>
</body>
</html>
