<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Especialista - Agendador de Citas</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .esp-container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .esp-panel { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .cita-card { border: 1px solid #e1e8ed; padding: 18px; border-radius: 8px; margin-bottom: 15px; }
        .cita-card.completada { opacity: 0.75; border-color: #28a745; }
        .estado-pill { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .estado-pendiente { background: #fff3cd; color: #856404; }
        .estado-completada { background: #d4edda; color: #155724; }
        .toast-notificacion { position: fixed; top: 20px; right: 20px; background: #28a745; color: #fff; padding: 15px 25px; border-radius: 8px; display: none; z-index: 1100; }
        .toast-notificacion.error { background: #dc3545; }
    </style>
</head>
<body>
    <header class="header">
        <h1 class="header_logo">Agendador de Citas</h1>
        <nav class="nav">
            <ul class="nav__list">
                <li class="nav__item"><a href="PerfilEspecialista.html" class="nav__link" style="background:rgba(255,255,255,0.3)">Mis Citas</a></li>
            </ul>
        </nav>
    </header>

    <main class="esp-container">
        <section class="esp-panel">
            <h2 id="tituloBienvenida">Citas agendadas con pacientes</h2>
            <p id="subtituloEsp">Consulte y marque como completadas las atenciones realizadas.</p>
            <div id="listaCitasEsp" style="margin-top:20px">
                <p>Cargando citas...</p>
            </div>
        </section>
        <button onclick="perfilEspecialistaView.cerrarSesion()" style="background:#dc3545;color:#fff;margin-top:15px">Cerrar Sesión</button>
    </main>

    <div id="toast" class="toast-notificacion"></div>
    <script src="../ViewHandling/PerfilEspecialistaView.js"></script>
</body>
</html>
