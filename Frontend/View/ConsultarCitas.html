<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar Citas</title>
    <link rel="stylesheet" href="styles.css">
    <script>

        <h1 class="header_logo">Agendador de Citas</h1>

        <nav class="nav" id="mainNav" aria-label="Navegación principal">

            <h2>Mis Citas Reservadas</h2>
            <p>A continuación puedes ver los detalles de las citas médicas que tienes programadas.</p>
