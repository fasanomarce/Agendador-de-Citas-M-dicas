<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Secretario - Agendador de Citas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="perfil-layout.css">
</head>
<body>
    <header class="header">
        <h1 class="header_logo">Agendador de Citas</h1>
        <nav class="nav">
            <ul class="nav__list">
                <li class="nav__item"><a href="ConsultarCitas.html" class="nav__link">Gestión de Citas</a></li>
                <li class="nav__item"><a href="PerfilSecretario.html" class="nav__link" style="background-color: rgba(255,255,255,0.3);">Operaciones</a></li>
            </ul>
        </nav>
    </header>

    <main class="perfil-container">
        <aside class="perfil-sidebar">
            <img id="sideAvatar" src="" alt="Avatar" class="avatar-grande">
            <h3 id="sideNombre" class="nombre-perfil"></h3>
            <span class="rol-tag secretario">Secretario</span>
            <p id="sideArea" style="font-size:13px;color:#666;"></p>
            <button type="button" class="btn-cerrar-sesion" id="btnCerrarSesion">Cerrar Sesión</button>
        </aside>

        <section class="perfil-main">
            <div class="buscador-panel">
                <h3>Gestión de Pacientes</h3>
                <input type="text" id="buscadorPaciente" class="input-buscar" placeholder="Buscar por nombre, apellido o cédula...">
                <ul id="listaPacientes" class="pacientes-lista"></ul>
            </div>

            <h2 id="tituloFormulario">Modificar datos del paciente</h2>
            <form id="perfilForm" novalidate>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                    <div class="input-group">
                        <label for="inputNombre">Nombre*</label>
                        <input type="text" id="inputNombre" required>
                    </div>
                    <div class="input-group">
                        <label for="inputApellido">Apellido*</label>
                        <input type="text" id="inputApellido" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="inputCorreo">Correo*</label>
                    <input type="text" id="inputCorreo" required>
                </div>
                <div class="input-group">
                    <label for="inputTelefono">Teléfono</label>
                    <input type="text" id="inputTelefono">
                </div>
                <div class="input-group">
                    <label for="inputBiografia">Observaciones</label>
                    <textarea id="inputBiografia" rows="3"></textarea>
                </div>
                <button type="submit" id="btnGuardar">Guardar cambios del paciente</button>
            </form>

            <hr style="margin:35px 0;">

            <h3>Asignar bloques horarios a médicos</h3>
            <form id="bloquesForm">
                <div class="input-group">
                    <label for="bloqueEspecialidad">Especialidad</label>
                    <select id="bloqueEspecialidad" required>
                        <option value="">Seleccione...</option>
                        <option>Cardiología</option>
                        <option>Pediatría</option>
                        <option>Dermatología</option>
                        <option>Odontología</option>
                        <option>Neurología</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="bloqueEspecialistaId">ID del Especialista</label>
                    <input type="number" id="bloqueEspecialistaId" required>
                </div>
                <div class="input-group">
                    <label for="bloqueDia">Día</label>
                    <input type="text" id="bloqueDia" placeholder="Lunes" required>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                    <div class="input-group">
                        <label for="bloqueInicio">Hora inicio</label>
                        <input type="time" id="bloqueInicio" required>
                    </div>
                    <div class="input-group">
                        <label for="bloqueFin">Hora fin</label>
                        <input type="time" id="bloqueFin" required>
                    </div>
                </div>
                <button type="submit">Asignar bloque</button>
            </form>
        </section>
    </main>

    <div id="toast" class="toast-notificacion"></div>
    <script src="../ViewHandling/config.js"></script>
    <script src="../ViewHandling/PerfilSecretarioView.js"></script>
</body>
</html>
